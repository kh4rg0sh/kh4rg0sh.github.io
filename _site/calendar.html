<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --bg-grad-a: #111111;
        --bg-grad-b: #1c1c1c;
        --surface: #151515;
        --surface-soft: #1e1e1e;
        --surface-note: #f2f2f2;
        --surface-note-code: #dfdfdf;
        --border: #2d2d2d;
        --border-soft: #3d3d3d;
        --text: #f5f5f5;
        --text-muted: #a8a8a8;
        --text-note: #1b1b1b;
        --dim: #707070;
        --shadow: 0 16px 42px rgba(0, 0, 0, 0.55);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 10px;
        font-family: "Manrope", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 0%, var(--bg-grad-b) 0%, var(--bg) 58%);
      }

      .calendar-shell {
        width: calc(100vw - 20px);
        height: calc(100vh - 20px);
        margin: 0;
        padding: 18px;
        border-radius: 24px;
        border: 1px solid var(--border-soft);
        background: linear-gradient(145deg, #1a1a1a, #101010);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .calendar-header {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .header-center {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .header-left {
        text-align: center;
      }

      .header-left h1 {
        margin: 0;
        font-size: clamp(1.2rem, 2vw, 2rem);
        letter-spacing: 0.2px;
        text-align: center;
      }

      .header-left p {
        margin: 5px 0 0;
        color: var(--text-muted);
        font-size: 0.95rem;
        text-align: center;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .actions-right {
        justify-content: flex-end;
      }

      .month-switch {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.05rem;
        font-weight: 800;
      }

      .month-switch.hidden {
        visibility: hidden;
        pointer-events: none;
      }

      button {
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        background: linear-gradient(180deg, #202020, #161616);
        color: var(--text);
        padding: 9px 14px;
        font: inherit;
        cursor: pointer;
        transition: transform 170ms ease, border-color 170ms ease, background 200ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        border-color: #555555;
        background: linear-gradient(180deg, #252525, #1b1b1b);
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .content-area {
        margin-top: 16px;
        display: flex;
        gap: 12px;
        min-height: 0;
        height: calc(100% - 76px);
      }

      .calendar-pane {
        flex: 1 1 100%;
        min-width: 0;
        transition: flex-basis 320ms ease, transform 300ms ease;
      }

      .content-area.note-open .calendar-pane {
        flex-basis: 50%;
      }

      .grid-wrap {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: linear-gradient(180deg, #181818, #131313);
        padding: 10px;
        height: 100%;
      }

      .grid {
        display: grid;
        gap: 10px;
      }

      .grid.anim-zoom-in {
        animation: zoomIn 260ms ease;
      }

      .grid.anim-zoom-out {
        animation: zoomOut 240ms ease;
      }

      .year-grid {
        grid-template-columns: repeat(10, minmax(0, 1fr));
      }

      .month-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .day-grid,
      .weekday-row {
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .weekday-row {
        display: grid;
        gap: 8px;
        margin-bottom: 8px;
      }

      .weekday {
        text-align: center;
        color: #8f8f8f;
        font-size: 0.76rem;
      }

      .cell {
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        background: linear-gradient(180deg, #232323, #181818);
        color: var(--text);
      }

      .year-cell {
        min-height: 64px;
        font-size: 0.96rem;
        font-weight: 700;
      }

      .month-cell {
        min-height: 180px;
        padding: 8px;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .month-name {
        font-size: 0.95rem;
        font-weight: 700;
      }

      .mini-weekdays {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 2px;
        font-size: 0.58rem;
        color: #878787;
      }

      .mini-days {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 2px;
        flex: 1;
      }

      .mini-day {
        font-size: 0.62rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        background: #242424;
        min-height: 18px;
      }

      .mini-day.outside {
        background: #171717;
        color: #696969;
      }

      .day-cell {
        min-height: clamp(62px, 8vw, 98px);
        padding: 8px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        font-weight: 600;
      }

      .day-cell .date {
        font-size: 0.92rem;
      }

      .day-cell .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: transparent;
      }

      .day-cell.has-note .dot {
        background: #f5f5f5;
      }

      .day-cell.outside {
        background: linear-gradient(180deg, #171717, #131313);
        color: var(--dim);
      }

      .day-cell.active {
        border-color: #a9a9a9;
      }

      .note-panel {
        flex: 0 0 0;
        min-width: 0;
        opacity: 0;
        transform: translateX(18px);
        border: 1px solid var(--border-soft);
        border-radius: 16px;
        background: linear-gradient(180deg, #f5f5f5, #e6e6e6);
        color: var(--text-note);
        overflow: auto;
        transition: flex-basis 330ms ease, opacity 240ms ease, transform 300ms ease;
      }

      .content-area.note-open .note-panel {
        flex-basis: 50%;
        opacity: 1;
        transform: translateX(0);
      }

      .note-panel.open-anim {
        animation: panelIn 260ms ease;
      }

      .note-panel.close-anim {
        animation: panelOut 220ms ease;
      }

      .note-inner {
        padding: 14px;
      }

      .note-title {
        margin: 0 0 10px;
        font-size: 1.02rem;
        color: #202020;
      }

      .note-content {
        line-height: 1.55;
        color: #232323;
      }

      .note-content code {
        background: var(--surface-note-code);
        border-radius: 7px;
        padding: 2px 6px;
      }

      .note-content pre {
        background: #d8d8d8;
        border-radius: 10px;
        padding: 10px;
        overflow: auto;
      }

      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.94);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes zoomOut {
        from {
          opacity: 1;
          transform: scale(1.02);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes panelIn {
        from {
          opacity: 0;
          transform: translateX(20px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }

      @keyframes panelOut {
        from {
          opacity: 1;
          transform: translateX(0);
        }
        to {
          opacity: 0;
          transform: translateX(16px);
        }
      }

      @media (max-width: 1100px) {
        .month-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 860px) {
        .content-area {
          flex-direction: column;
        }
        .content-area.note-open .calendar-pane,
        .content-area.note-open .note-panel {
          flex-basis: 100%;
        }
      }

      @media (max-width: 700px) {
        body {
          padding: 6px;
        }
        .calendar-shell {
          width: calc(100vw - 12px);
          height: calc(100vh - 12px);
        }
        .calendar-header {
          grid-template-columns: 1fr;
          justify-items: center;
        }
        .actions-right {
          width: 100%;
          justify-content: center;
        }
        .year-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
        .month-grid {
          grid-template-columns: repeat(1, minmax(0, 1fr));
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <main class="calendar-shell">
      <header class="calendar-header">
        <div class="actions">
          <button id="prevMonthButton" class="month-switch hidden" aria-label="Previous month">
            &#8249;
          </button>
        </div>
        <div class="header-center">
          <div class="header-left">
            <h1 id="viewTitle">Calendar Explorer</h1>
            <p id="viewSubtitle">Select a date</p>
          </div>
        </div>
        <div class="actions actions-right">
          <button id="nextMonthButton" class="month-switch hidden" aria-label="Next month">
            &#8250;
          </button>
          <button id="backButton">Back</button>
        </div>
      </header>

      <section id="contentArea" class="content-area">
        <div class="calendar-pane">
          <div class="grid-wrap">
            <div id="weekdays" class="weekday-row" style="display: none"></div>
            <div id="grid" class="grid"></div>
          </div>
        </div>

        <aside id="notePanel" class="note-panel">
          <div class="note-inner">
            <h2 id="noteTitle" class="note-title"></h2>
            <article id="noteContent" class="note-content"></article>
          </div>
        </aside>
      </section>
      
    </main>

    <script>
      (() => {
        const START_YEAR = 2000;
        const END_YEAR = 2099;
        const MONTH_NAMES = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        const WEEKDAYS = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

        const today = new Date();
        const state = {
          view: "days",
          selectedYear: today.getFullYear(),
          selectedMonth: today.getMonth(),
          selectedDay: null,
        };

        const grid = document.getElementById("grid");
        const weekdays = document.getElementById("weekdays");
        const viewTitle = document.getElementById("viewTitle");
        const viewSubtitle = document.getElementById("viewSubtitle");
        const backButton = document.getElementById("backButton");
        const prevMonthButton = document.getElementById("prevMonthButton");
        const nextMonthButton = document.getElementById("nextMonthButton");
        const contentArea = document.getElementById("contentArea");
        const notePanel = document.getElementById("notePanel");
        const noteTitle = document.getElementById("noteTitle");
        const noteContent = document.getElementById("noteContent");

        function pad(num) {
          return String(num).padStart(2, "0");
        }

        function filePathForDate(year, month, day) {
          return `/calendar/entries/${year}-${pad(month + 1)}-${pad(day)}.md`;
        }

        function animateGrid(direction) {
          grid.classList.remove("anim-zoom-in", "anim-zoom-out");
          grid.classList.add(direction === "in" ? "anim-zoom-in" : "anim-zoom-out");
        }

        function clearGrid() {
          grid.innerHTML = "";
          weekdays.innerHTML = "";
          weekdays.style.display = "none";
          grid.className = "grid";
        }

        function setHeader() {
          const showMonthSwitchers = state.view === "days";
          prevMonthButton.classList.toggle("hidden", !showMonthSwitchers);
          nextMonthButton.classList.toggle("hidden", !showMonthSwitchers);
          if (state.view === "years") {
            viewTitle.textContent = "2000 - 2099";
            viewSubtitle.textContent = "Select a year";
          } else if (state.view === "months") {
            viewTitle.textContent = String(state.selectedYear);
            viewSubtitle.textContent = "Select a month";
          } else {
            viewTitle.textContent = `${MONTH_NAMES[state.selectedMonth]} ${state.selectedYear}`;
            viewSubtitle.textContent = "Select a day";
          }
          backButton.disabled = state.view === "years";
        }

        function closeNotePanel() {
          if (contentArea.classList.contains("note-open")) {
            notePanel.classList.remove("open-anim");
            notePanel.classList.add("close-anim");
            contentArea.classList.remove("note-open");
            setTimeout(() => notePanel.classList.remove("close-anim"), 240);
          }
          state.selectedDay = null;
          document.querySelectorAll(".day-cell.active").forEach((el) => el.classList.remove("active"));
        }

        function daysInMonth(year, month) {
          return new Date(year, month + 1, 0).getDate();
        }

        function shiftMonth(delta) {
          const wasNoteOpen = contentArea.classList.contains("note-open");
          const previousSelectedDay = state.selectedDay;

          const shifted = new Date(state.selectedYear, state.selectedMonth + delta, 1);
          state.selectedYear = shifted.getFullYear();
          state.selectedMonth = shifted.getMonth();
          renderDays(delta > 0 ? "in" : "out");

          if (!wasNoteOpen || !previousSelectedDay) {
            return;
          }

          const targetDay = Math.min(
            previousSelectedDay.day,
            daysInMonth(state.selectedYear, state.selectedMonth)
          );
          const selector = `.day-cell[data-year="${state.selectedYear}"][data-month="${state.selectedMonth}"][data-day="${targetDay}"]`;
          const targetBtn = grid.querySelector(selector);
          if (targetBtn) {
            openDayNote(
              state.selectedYear,
              state.selectedMonth,
              targetDay,
              filePathForDate(state.selectedYear, state.selectedMonth, targetDay),
              targetBtn
            );
          }
        }

        function getMonthMatrix(year, month) {
          const firstDay = new Date(year, month, 1).getDay();
          const totalDays = new Date(year, month + 1, 0).getDate();
          const prevTotalDays = new Date(year, month, 0).getDate();
          const cells = [];

          for (let i = firstDay - 1; i >= 0; i -= 1) {
            cells.push({ day: prevTotalDays - i, offsetMonth: -1 });
          }
          for (let day = 1; day <= totalDays; day += 1) {
            cells.push({ day, offsetMonth: 0 });
          }
          while (cells.length % 7 !== 0) {
            cells.push({ day: cells.length - (firstDay + totalDays) + 1, offsetMonth: 1 });
          }
          while (cells.length < 42) {
            cells.push({ day: cells.length - (firstDay + totalDays) + 1, offsetMonth: 1 });
          }
          return cells;
        }

        function buildWeekdayHeader() {
          weekdays.style.display = "grid";
          WEEKDAYS.forEach((name) => {
            const el = document.createElement("div");
            el.className = "weekday";
            el.textContent = name;
            weekdays.appendChild(el);
          });
        }

        function renderYears(direction = "out") {
          state.view = "years";
          clearGrid();
          setHeader();
          grid.classList.add("year-grid");
          animateGrid(direction);
          for (let year = START_YEAR; year <= END_YEAR; year += 1) {
            const btn = document.createElement("button");
            btn.className = "cell year-cell";
            btn.textContent = String(year);
            btn.addEventListener("click", () => {
              state.selectedYear = year;
              renderMonths("in");
            });
            grid.appendChild(btn);
          }
        }

        function renderMonths(direction = "out") {
          state.view = "months";
          clearGrid();
          setHeader();
          grid.classList.add("month-grid");
          animateGrid(direction);

          MONTH_NAMES.forEach((monthName, monthIndex) => {
            const card = document.createElement("button");
            card.className = "cell month-cell";
            const preview = getMonthMatrix(state.selectedYear, monthIndex);

            const miniWeekdays = WEEKDAYS.map((d) => `<span>${d[0]}</span>`).join("");
            const miniDays = preview
              .map(
                (cell) =>
                  `<span class="mini-day${cell.offsetMonth !== 0 ? " outside" : ""}">${cell.day}</span>`
              )
              .join("");

            card.innerHTML = `
              <div class="month-name">${monthName}</div>
              <div class="mini-weekdays">${miniWeekdays}</div>
              <div class="mini-days">${miniDays}</div>
            `;

            card.addEventListener("click", () => {
              state.selectedMonth = monthIndex;
              renderDays("in");
            });
            grid.appendChild(card);
          });
        }

        function renderDays(direction = "out") {
          state.view = "days";
          clearGrid();
          setHeader();
          grid.classList.add("day-grid");
          buildWeekdayHeader();
          animateGrid(direction);

          const cells = getMonthMatrix(state.selectedYear, state.selectedMonth);
          cells.forEach((cell) => {
            const btn = document.createElement("button");
            const isOutside = cell.offsetMonth !== 0;
            btn.className = `cell day-cell${isOutside ? " outside" : ""}`;
            btn.innerHTML = `<span class="date">${cell.day}</span><span class="dot"></span>`;

            const targetDate = new Date(state.selectedYear, state.selectedMonth + cell.offsetMonth, cell.day);
            const y = targetDate.getFullYear();
            const m = targetDate.getMonth();
            const d = targetDate.getDate();
            const path = filePathForDate(y, m, d);

            fetch(path, { method: "HEAD" })
              .then((res) => {
                if (res.ok) {
                  btn.classList.add("has-note");
                }
              })
              .catch(() => {});

            btn.dataset.year = String(y);
            btn.dataset.month = String(m);
            btn.dataset.day = String(d);
            btn.addEventListener("click", () => openDayNote(y, m, d, path, btn));
            grid.appendChild(btn);
          });
        }

        async function openDayNote(year, month, day, path, btn) {
          const isSameSelection =
            state.selectedDay &&
            state.selectedDay.year === year &&
            state.selectedDay.month === month &&
            state.selectedDay.day === day;

          if (isSameSelection && contentArea.classList.contains("note-open")) {
            notePanel.classList.remove("open-anim");
            notePanel.classList.add("close-anim");
            contentArea.classList.remove("note-open");
            setTimeout(() => notePanel.classList.remove("close-anim"), 240);
            state.selectedDay = null;
            document.querySelectorAll(".day-cell.active").forEach((el) => el.classList.remove("active"));
            return;
          }

          document.querySelectorAll(".day-cell.active").forEach((el) => el.classList.remove("active"));
          btn.classList.add("active");
          state.selectedDay = { year, month, day };

          const dateLabel = `${year}-${pad(month + 1)}-${pad(day)}`;
          noteTitle.textContent = `Note for ${dateLabel}`;
          noteContent.innerHTML = "Loading...";

          if (!contentArea.classList.contains("note-open")) {
            contentArea.classList.add("note-open");
            notePanel.classList.remove("close-anim");
            notePanel.classList.add("open-anim");
            setTimeout(() => notePanel.classList.remove("open-anim"), 280);
          }

          try {
            const res = await fetch(path);
            if (!res.ok) {
              noteContent.innerHTML =
                "No markdown found for this day.";
              return;
            }
            noteContent.innerHTML = marked.parse(await res.text());
          } catch (err) {
            noteContent.textContent = "Could not load note. Please try again.";
          }
        }

        backButton.addEventListener("click", () => {
          closeNotePanel();

          if (state.view === "days") {
            renderMonths("out");
          } else if (state.view === "months") {
            renderYears("out");
          }
        });
        prevMonthButton.addEventListener("click", () => shiftMonth(-1));
        nextMonthButton.addEventListener("click", () => shiftMonth(1));

        // /calendar should directly open on today's month.
        renderDays("in");
      })();
    </script>
  </body>
</html>
